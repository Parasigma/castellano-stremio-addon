<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CASTELLAR · Reproductor</title>
  <link rel="icon" type="image/svg+xml" href="/logo.svg" />
  <style>
    :root { --bg:#0f1115; --card:#1f232c; --border:#2b3039; --text:#e6e8ec; --muted:#8b93a1; --accent:#e50914; --ok:#3ecf6b; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--text); }
    header { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom:1px solid var(--border); background:#16181e; }
    .brand { display:flex; align-items:center; gap:12px; }
    .brand img { width:40px; height:40px; border-radius:9px; }
    h1 { font-size:18px; margin:0; }
    .sub { color:var(--muted); font-size:12px; margin:2px 0 0; }
    main { max-width:1000px; margin:0 auto; padding:20px; }
    button { cursor:pointer; font-size:15px; border-radius:10px; border:none; }
    .btn { background:var(--accent); color:#fff; padding:11px 18px; font-weight:600; }
    .btn-ghost { background:transparent; color:var(--text); border:1px solid var(--border); padding:9px 14px; font-size:14px; }
    /* login */
    #login { max-width:340px; margin:12vh auto; text-align:center; }
    #login img { width:84px; height:84px; border-radius:18px; margin-bottom:16px; }
    #login h2 { font-size:20px; margin:0 0 6px; }
    #login p { color:var(--muted); font-size:14px; margin:0 0 20px; }
    #pw { width:100%; padding:13px; font-size:16px; border-radius:10px; border:1px solid var(--border); background:#0b0d11; color:var(--text); margin-bottom:12px; }
    #login .btn { width:100%; }
    #loginErr { color:var(--accent); font-size:14px; margin-top:12px; min-height:18px; }
    /* grid */
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:14px; }
    .vid { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px; cursor:pointer; transition:border-color .15s; }
    .vid:hover { border-color:var(--accent); }
    .vid .ico { font-size:30px; }
    .vid .name { font-size:14px; margin:8px 0 4px; word-break:break-word; }
    .vid .meta { color:var(--muted); font-size:12px; }
    .hidden { display:none !important; }
    /* player */
    #play video { width:100%; max-height:78vh; background:#000; border-radius:10px; }
    #play .title { margin:12px 0; font-size:16px; }
    .note { color:var(--muted); font-size:13px; margin-top:16px; }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <img src="/logo.svg" alt="CASTELLAR" />
      <div><h1>CASTELLAR</h1><p class="sub">Reproductor privado</p></div>
    </div>
    <button id="logoutBtn" class="btn-ghost hidden">Salir</button>
  </header>

  <main>
    <!-- LOGIN -->
    <section id="login">
      <img src="/logo.svg" alt="" />
      <h2>Acceso privado</h2>
      <p>Introduce la contraseña para ver tus vídeos.</p>
      <input id="pw" type="password" placeholder="Contraseña" autocomplete="current-password" />
      <button class="btn" id="loginBtn">Entrar</button>
      <div id="loginErr"></div>
    </section>

    <!-- BIBLIOTECA -->
    <section id="lib" class="hidden">
      <label style="display:flex;align-items:center;gap:8px;margin-bottom:12px;color:var(--muted);font-size:14px;cursor:pointer">
        <input type="checkbox" id="onlyMp4" checked /> Mostrar solo vídeos listos (MP4, con sonido)
      </label>
      <div id="libInfo" class="note" style="margin-bottom:14px"></div>
      <div id="grid" class="grid"></div>
    </section>

    <!-- REPRODUCTOR -->
    <section id="play" class="hidden">
      <button class="btn-ghost" id="backBtn">← Volver</button>
      <div class="title" id="playTitle"></div>
      <video id="video" controls autoplay playsinline></video>
      <p class="note">Si el vídeo no se reproduce en el iPad, suele ser por el formato: en Safari van mejor los <b>MP4 (H.264)</b>. Los MKV pueden no reproducirse en el navegador del iPad.</p>
    </section>
  </main>

  <script>
    const API = location.pathname.replace(/\/+$/, ''); // p.ej. /player
    let token = localStorage.getItem('castellar_token') || '';

    const $ = (id) => document.getElementById(id);
    function show(view) {
      ['login', 'lib', 'play'].forEach((v) => $(v).classList.toggle('hidden', v !== view));
      $('logoutBtn').classList.toggle('hidden', view === 'login');
      if (view !== 'play') { $('video').pause(); $('video').removeAttribute('src'); $('video').load(); }
    }
    function fmtSize(b) { const gb = b / 1073741824; return gb >= 1 ? gb.toFixed(2) + ' GB' : (b / 1048576).toFixed(0) + ' MB'; }

    async function doLogin() {
      const pw = $('pw').value;
      $('loginErr').textContent = '';
      try {
        const r = await fetch(`${API}/login`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: pw }) });
        const d = await r.json();
        if (d.ok) { token = d.token; localStorage.setItem('castellar_token', token); $('pw').value = ''; loadList(); }
        else $('loginErr').textContent = d.error || 'Error';
      } catch (e) { $('loginErr').textContent = 'No se pudo conectar.'; }
    }

    let allVideos = [];
    function renderGrid() {
      const onlyMp4 = $('onlyMp4').checked;
      const vids = onlyMp4 ? allVideos.filter((v) => /\.mp4$/i.test(v.name)) : allVideos;
      const grid = $('grid'); grid.innerHTML = '';
      if (!allVideos.length) { $('libInfo').textContent = 'No hay vídeos en la biblioteca todavía.'; return; }
      if (!vids.length) { $('libInfo').textContent = 'No hay vídeos en MP4 todavía. Convierte alguno desde el panel, o desmarca la casilla.'; return; }
      $('libInfo').textContent = `${vids.length} vídeo(s) disponibles.`;
      vids.forEach((v) => {
        const el = document.createElement('div');
        el.className = 'vid';
        el.innerHTML = `<div class="ico">🎬</div><div class="name">${v.name.replace(/</g, '&lt;')}</div><div class="meta">${fmtSize(v.size)}</div>`;
        el.addEventListener('click', () => playVideo(v.id, v.name));
        grid.appendChild(el);
      });
    }

    async function loadList() {
      try {
        const r = await fetch(`${API}/list?t=${encodeURIComponent(token)}`);
        if (r.status === 401) { show('login'); return; }
        const d = await r.json();
        allVideos = d.videos || [];
        renderGrid();
        show('lib');
      } catch (e) { show('login'); }
    }
    document.addEventListener('change', (e) => { if (e.target && e.target.id === 'onlyMp4') renderGrid(); });

    function playVideo(id, name) {
      $('playTitle').textContent = name;
      $('video').src = `${API}/stream/${id}?t=${encodeURIComponent(token)}`;
      show('play');
    }

    $('loginBtn').addEventListener('click', doLogin);
    $('pw').addEventListener('keydown', (e) => { if (e.key === 'Enter') doLogin(); });
    $('logoutBtn').addEventListener('click', () => { localStorage.removeItem('castellar_token'); token = ''; show('login'); });
    $('backBtn').addEventListener('click', () => show('lib'));

    // Inicio: si hay token, intenta cargar; si no, login.
    if (token) loadList(); else show('login');
  </script>
</body>
</html>
